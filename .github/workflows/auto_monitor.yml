name: 🏎️ 六大平台二手車全網監控系統

on:
  schedule:
    # 台灣時間每天早上 06:30 執行 (22:30 UTC)
    - cron: '30 22 * * *'
  workflow_dispatch: # 讓您可以手動隨時觸發

jobs:
  car-monitor-job:
    runs-on: ubuntu-latest

    steps:
    - name: 📥 檢出程式碼
      uses: actions/checkout@v3

    - name: 🐍 設定 Python 環境
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: 🌐 安裝 Chrome 瀏覽器 (Selenium 必備)
      run: |
        sudo apt-get update
        sudo apt-get install -y google-chrome-stable

    - name: 📦 安裝 Python 必要套件
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: 🕷️ 執行【1/6】8891 爬蟲
      run: python PythonProject/crawler_8891.py
      continue-on-error: true # 即使其中一支掛掉，後面的也要繼續跑

    - name: 🕷️ 執行【2/6】SAVE 爬蟲
      run: python PythonProject/crawler_save.py
      continue-on-error: true

    - name: 🕷️ 執行【3/6】HOT 爬蟲
      run: python PythonProject/crawler_hot.py
      continue-on-error: true

    - name: 🕷️ 執行【4/6】SUM 爬蟲
      run: python PythonProject/crawler_sum.py
      continue-on-error: true

    - name: 🕷️ 執行【5/6】ABC 爬蟲
      run: python PythonProject/crawler_abc.py
      continue-on-error: true

    - name: 🕷️ 執行【6/6】LUXLIFE 原廠爬蟲
      run: python PythonProject/luxlife_crawler.py
      continue-on-error: true

    - name: 🚀 執行 N7 戰情報推播 (LINE)
      env:
        LINE_TOKEN: ${{ secrets.LINE_TOKEN }}
        LINE_GROUP_ID: ${{ secrets.LINE_GROUP_ID }}
      run: python PythonProject/line_notify_n7.py

    - name: 💾 保存最新數據 (Git Push)
      # 關鍵步驟：把爬蟲更新後的 .db 檔案存回 GitHub，否則下次執行會變回舊數據
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action Bot"
        git add car_listings_v2.db
        git commit -m "📊 自動更新資料庫: $(date +'%Y-%m-%d %H:%M')" || echo "無資料異動"
        git push
